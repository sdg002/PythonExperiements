trigger:
  branches:
    include:
      - main
      - master

  paths:
    include:
      - "docker-windows/base-python-image/*"
    exclude:
      - "docker-windows/docs/*"
      - "docker-windows/docs/readme.md"

pr:
  paths:
    include:
      - "docker-windows/base-python-image/*"
    exclude:
      - "docker-windows/docs/*"
      - "docker-windows/docs/readme.md"

pool:
  vmImage: "windows-2022"

variables:
  workingDirectory: "$(System.DefaultWorkingDirectory)/docker-windows/base-python-image"
  imagetag39: "$(BuildName)"
  imagetag313: "$(BuildName)"
  containerRegistry: "mywin001vm.azurecr.io" # Replace with your registry URL
  repositoryName39: "python3.9-baseimage"
  repositoryName313: "python3.13-baseimage"
  dockerRegistryServiceConnection: "mywin001vmAzureAcr" # Replace with your service connection name
  MajorVersion: "1"
  MinorVersion: $[counter(variables['MajorVersion'], 1)]
  ReleaseBuildName: $(MajorVersion).$(MinorVersion).0
  PreReleaseBuildName: $(MajorVersion).$(MinorVersion).$(Build.BuildId)-beta
  ${{ if eq(variables['Build.SourceBranchName'], 'master') }}:
    BuildName: "${{ variables.ReleaseBuildName }}"
    latestTag: "latest"
  ${{ else }}:
    BuildName: "${{ variables.PreReleaseBuildName }}"
    latestTag: "beta-latest"

name: "${{ variables.BuildName }}"

stages:
  - stage: Build
    displayName: "Build Stage"
    jobs:
      - job: BuildJob
        displayName: "Build and Test"
        steps:
          - task: PowerShell@2
            displayName: "Dump variables"
            inputs:
              targetType: "inline"
              script: |
                Write-Host "PowerShell task execution started"
                dir env:
              workingDirectory: "$(workingDirectory)"

          - task: Docker@2
            displayName: "Build and push 39"
            inputs:
              command: "buildAndPush"
              dockerfile: "$(workingDirectory)/Dockerfile39"
              buildContext: "$(workingDirectory)"
              repository: "$(repositoryName39)"
              tags: |
                $(imagetag39)
                $(latestTag)
              containerRegistry: "$(dockerRegistryServiceConnection)"

          - task: Docker@2
            displayName: "Build and push 313"
            inputs:
              command: "buildAndPush"
              dockerfile: "$(workingDirectory)/Dockerfile313"
              buildContext: "$(workingDirectory)"
              repository: "$(repositoryName313)"
              tags: |
                $(imagetag313)
                $(latestTag)
              containerRegistry: "$(dockerRegistryServiceConnection)"

          - task: Docker@2
            displayName: "List all Docker images"
            inputs:
              command: "images"

          - script: |
              docker run --rm $(containerRegistry)/$(repositoryName39):$(imagetag39)  python --version
            displayName: "39-Check Python version in Docker"

          - script: |
              docker run --rm $(containerRegistry)/$(repositoryName313):$(imagetag313)  python --version
            displayName: "313-Check Python version in Docker"
