trigger:
  branches:
    include:
      - main
      - master

  paths:
    include:
      - "docker-windows/custom-python-app-acr-build/*"
    exclude:
      - "docker-windows/docs/*"
      - "docker-windows/docs/readme.md"

pr:
  paths:
    include:
      - "docker-windows/custom-python-app-acr-build/*"
    exclude:
      - "docker-windows/docs/*"
      - "docker-windows/docs/readme.md"

pool:
  vmImage: "windows-2022"

variables:
  workingDirectory: "$(System.DefaultWorkingDirectory)/docker-windows/custom-python-app-acr-build"
  imagetag: $(Build.BuildNumber)
  containerRegistry: "mywin001vm.azurecr.io" # Replace with your registry URL
  repositoryName39: "python3.9-customapp-acr"
  repositoryName313: "python3.13-customapp-acr"
  dockerRegistryServiceConnection: "mywin001vmAzureAcr" # Replace with your service connection name
  azureSubscription: "azure pay as you go demo (sep 21)" # Replace with your Azure service connection name
  MajorVersion: "1"
  MinorVersion: $[counter(variables['MajorVersion'], 1)]
  ReleaseBuildName: $(MajorVersion).$(MinorVersion).0
  PreReleaseBuildName: $(MajorVersion).$(MinorVersion).$(Build.BuildId)-beta
  ${{ if eq(variables['Build.SourceBranchName'], 'master') }}:
    BuildName: "${{ variables.ReleaseBuildName }}"
    latestTag: "latest"
  ${{ else }}:
    BuildName: "${{ variables.PreReleaseBuildName }}"
    latestTag: "beta-latest"

name: "${{ variables.BuildName }}"

stages:
  - stage: Build
    displayName: "Build Stage"
    jobs:
      - job: BuildJob
        displayName: "Build and Test"
        steps:
          - task: PowerShell@2
            displayName: "Dump variables"
            inputs:
              targetType: "inline"
              script: |
                Write-Host "PowerShell task execution started"
                dir env:
              workingDirectory: "$(workingDirectory)"

          - task: AzureCLI@2
            displayName: "ACR Build Image 39"
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: ps
              scriptLocation: "inlineScript"
              workingDirectory: $(workingDirectory)
              inlineScript: az acr build --registry $(containerRegistry) --platform windows --image $(repositoryName39):$(imagetag) --image $(repositoryName39):$(latestTag) --build-arg BASE_REGISTRY=$(containerRegistry) --file Dockerfile39 .

          - task: AzureCLI@2
            displayName: "Run built image 39"
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: ps
              scriptLocation: "inlineScript"
              workingDirectory: $(workingDirectory)
              inlineScript: |
                echo "Logging into ACR"
                az acr login --name $(containerRegistry)
                echo "Running image $(repositoryName39):$(imagetag)"
                docker run --rm $(containerRegistry)/$(repositoryName39):$(imagetag) python -c "print('container started')"

          - task: AzureCLI@2
            displayName: "ACR Build Image 313"
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: ps
              scriptLocation: "inlineScript"
              workingDirectory: $(workingDirectory)
              inlineScript: az acr build --registry $(containerRegistry) --platform windows --image $(repositoryName313):$(imagetag) --image $(repositoryName313):$(latestTag) --build-arg BASE_REGISTRY=$(containerRegistry) --file Dockerfile313 .
